<!DOCTYPE html>
{% load book_tags %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжный каталог{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
        }
        nav {
            background: #34495e;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 5px 10px;
        }
        .book-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .price {
            color: red;
            font-size: 1.2em;
            font-weight: bold;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 0 0 10px 10px;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Книжный каталог</h1>
        </header>
        
        <nav>
            <a href="{% url 'catalog:book_list' %}">Главная</a>
            <a href="/admin/">Админка</a>
        </nav>
        
        {% block content %}
        {% endblock %}
        
        <footer>
            <p>&copy; {% current_year %} Книжный каталог | Всего книг: {% book_count %}</p>
        </footer>
    </div>
</body>
</html>
