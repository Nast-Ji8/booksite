<!DOCTYPE html>
{% load book_tags %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Книжный каталог{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
        }
        nav {
            background: #34495e;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 5px 10px;
        }
        nav a:hover {
            background: #e74c3c;
            border-radius: 5px;
        }
        .book-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .price {
            color: #e74c3c;
            font-size: 1.2em;
            font-weight: bold;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 0 0 10px 10px;
        }
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }
        .cart-table th, .cart-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .cart-table th {
            background: #34495e;
            color: white;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: bold;
            color: white;
        }
        .status-new { background: #3498db; }
        .status-processing { background: #f39c12; }
        .status-completed { background: #27ae60; }
        .status-cancelled { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Книжный магазин</h1>
        </header>
        
        <nav>
            <a href="{% url 'catalog:book_list' %}">📖 Каталог книг</a>
            <a href="{% url 'catalog:cart_list' %}">🛒 Корзины</a>
            <a href="/admin/">⚙️ Админка</a>
        </nav>
        
        {% block content %}
        {% endblock %}
        
        <footer>
            <p>&copy; {% current_year %} Книжный магазин | Всего книг: {% book_count %}</p>
        </footer>
    </div>
</body>
</html>
